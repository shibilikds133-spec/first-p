<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>
  <!-- Icon: Overlapping gradient rings -->
  <g transform="translate(2, 2)">
    <circle cx="18" cy="18" r="12" fill="none" stroke="url(#logo-gradient)" stroke-width="4" stroke-linecap="round" stroke-dasharray="50 20"/>
    <circle cx="18" cy="18" r="6" fill="none" stroke="url(#logo-gradient)" stroke-width="3"/>
  </g>
  <!-- Text: raihsoft -->
  <text x="44" y="26" font-family="'Outfit', 'Inter', sans-serif" font-size="22" font-weight="700" fill="#0F172A" letter-spacing="-0.5">raih<tspan font-weight="300" fill="#4B5563">soft</tspan></text>
</svg>
